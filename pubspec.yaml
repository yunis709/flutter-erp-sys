name: flutter_erp
description: ERP System for Retail Stores - Flutter Desktop

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Database
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.20
  
  # Sync
  supabase_flutter: ^2.5.0
  
  # Printing
  esc_pos_printer: ^4.1.0
  esc_pos_utils: ^1.1.0
  
  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^13.2.0
  
  # UI
  fluent_ui: ^4.9.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  
  # PDF & Excel
  pdf: ^3.10.0
  excel: ^4.0.2
  path_provider: ^2.1.3
  
  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Security
  encrypt: ^5.0.1
  crypto: ^3.0.3
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Network
  connectivity_plus: ^5.0.2
  http: ^1.2.0
  
  # Environment
  flutter_dotenv: ^5.1.0
  
  # Barcode
  barcode_widget: ^2.0.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.8
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  
  # Testing
  integration_test:
    sdk: flutter
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/icons/
  
  fonts:
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
